<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="540" height="120">
  <defs>
    <!-- 鏡框漸層（更銳利，提高對比） -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="40%" stop-color="#5B7FFF"/>
      <stop offset="100%" stop-color="#7B3FFF"/>
    </linearGradient>
    <!-- 鏡片底色（接近純黑） -->
    <radialGradient id="lensFill" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0A1235"/>
      <stop offset="60%" stop-color="#040818"/>
      <stop offset="100%" stop-color="#01030A"/>
    </radialGradient>
    <!-- 握把金屬漸層 -->
    <linearGradient id="handleMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="50%" stop-color="#5B7FFF"/>
      <stop offset="100%" stop-color="#7B3FFF"/>
    </linearGradient>
    <!-- 探針掃描漸層 -->
    <linearGradient id="probeBeam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7DF9FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7DF9FF" stop-opacity="0"/>
    </linearGradient>
    <!-- die 焊墊閃光 -->
    <radialGradient id="padGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DF9FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7DF9FF" stop-opacity="0"/>
    </radialGradient>

    <!-- 晶片電路網格 pattern (die 紋理) -->
    <pattern id="diePattern" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="4" fill="none"/>
      <path d="M 0 2 L 4 2 M 2 0 L 2 4" stroke="#5B7FFF" stroke-width="0.15" opacity="0.4"/>
    </pattern>

    <!-- 鏡片裁切 -->
    <clipPath id="lensClip">
      <circle cx="50" cy="50" r="30"/>
    </clipPath>

    <!-- 細微發光 -->
    <filter id="microGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 強發光（探針點） -->
    <filter id="probeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ==================== ICON ==================== -->
  <g transform="translate(8, 10)">

    <!-- 四角 HUD 對位框 -->
    <g stroke="#7DF9FF" stroke-width="0.8" fill="none" opacity="0.55">
      <path d="M 4 12 L 4 4 L 12 4"/>
      <path d="M 88 4 L 96 4 L 96 12"/>
      <path d="M 4 88 L 4 96 L 12 96"/>
      <path d="M 88 96 L 96 96 L 96 88"/>
    </g>

    <!-- 編號標記 -->
    <text x="10" y="10" font-family="'JetBrains Mono', monospace" font-size="3" fill="#5B7FFF" opacity="0.7" letter-spacing="0.4">SCAN-01</text>
    <text x="78" y="100" font-family="'JetBrains Mono', monospace" font-size="3" fill="#5B7FFF" opacity="0.7" letter-spacing="0.4">CH:A1</text>

    <!-- 對位十字基準（左上 +） -->
    <g stroke="#5B7FFF" stroke-width="0.4" opacity="0.5">
      <line x1="14" y1="14" x2="20" y2="14"/>
      <line x1="17" y1="11" x2="17" y2="17"/>
    </g>
    <g stroke="#5B7FFF" stroke-width="0.4" opacity="0.5">
      <line x1="80" y1="86" x2="86" y2="86"/>
      <line x1="83" y1="83" x2="83" y2="89"/>
    </g>

    <!-- 三層精度環 -->
    <g fill="none">
      <!-- 外側極細虛線環 -->
      <circle cx="50" cy="50" r="36.5" stroke="#5B7FFF" stroke-width="0.3" stroke-dasharray="1 2" opacity="0.5"/>
      <!-- 主環 -->
      <circle cx="50" cy="50" r="32" stroke="url(#ringGrad)" stroke-width="2.2"/>
      <!-- 內側細環 -->
      <circle cx="50" cy="50" r="28.5" stroke="#5B7FFF" stroke-width="0.4" opacity="0.5"/>
    </g>

    <!-- 鏡框 12/3/6/9 點主刻度 + 中間細刻度 -->
    <g stroke="#7DF9FF" opacity="0.85">
      <!-- 主刻度 -->
      <line x1="50" y1="14" x2="50" y2="19" stroke-width="0.8"/>
      <line x1="50" y1="81" x2="50" y2="86" stroke-width="0.8"/>
      <line x1="14" y1="50" x2="19" y2="50" stroke-width="0.8"/>
      <line x1="81" y1="50" x2="86" y2="50" stroke-width="0.8"/>
    </g>
    <!-- 細刻度（每 30 度一格,共 12 格） -->
    <g stroke="#5B7FFF" stroke-width="0.3" opacity="0.55">
      <line x1="50" y1="15.5" x2="50" y2="17.5" transform="rotate(30 50 50)"/>
      <line x1="50" y1="15.5" x2="50" y2="17.5" transform="rotate(60 50 50)"/>
      <line x1="50" y1="15.5" x2="50" y2="17.5" transform="rotate(120 50 50)"/>
      <line x1="50" y1="15.5" x2="50" y2="17.5" transform="rotate(150 50 50)"/>
      <line x1="50" y1="15.5" x2="50" y2="17.5" transform="rotate(210 50 50)"/>
      <line x1="50" y1="15.5" x2="50" y2="17.5" transform="rotate(240 50 50)"/>
      <line x1="50" y1="15.5" x2="50" y2="17.5" transform="rotate(300 50 50)"/>
      <line x1="50" y1="15.5" x2="50" y2="17.5" transform="rotate(330 50 50)"/>
    </g>

    <!-- ============ 鏡片內部（晶片檢測） ============ -->
    <g clip-path="url(#lensClip)">
      <!-- 底色 -->
      <circle cx="50" cy="50" r="30" fill="url(#lensFill)"/>

      <!-- die pattern 全鋪 -->
      <rect x="20" y="20" width="60" height="60" fill="url(#diePattern)"/>

      <!-- 中央 die 區塊（晶粒方框） -->
      <g fill="none" stroke="#5B7FFF">
        <!-- 主 die 邊框 -->
        <rect x="38" y="38" width="24" height="24" stroke-width="0.5" opacity="0.7"/>
        <!-- 內層 die -->
        <rect x="42" y="42" width="16" height="16" stroke-width="0.3" opacity="0.5"/>
        <!-- core 中心 -->
        <rect x="46" y="46" width="8" height="8" stroke-width="0.3" opacity="0.6"/>
      </g>

      <!-- die 焊墊（pad） -->
      <g fill="#7DF9FF" filter="url(#microGlow)">
        <!-- 上排 -->
        <rect x="40" y="36.5" width="1.5" height="1.5" opacity="0.85"/>
        <rect x="44" y="36.5" width="1.5" height="1.5" opacity="0.7"/>
        <rect x="48" y="36.5" width="1.5" height="1.5" opacity="0.85"/>
        <rect x="52" y="36.5" width="1.5" height="1.5" opacity="0.7"/>
        <rect x="56" y="36.5" width="1.5" height="1.5" opacity="0.85"/>
        <!-- 下排 -->
        <rect x="40" y="62" width="1.5" height="1.5" opacity="0.7"/>
        <rect x="44" y="62" width="1.5" height="1.5" opacity="0.85"/>
        <rect x="48" y="62" width="1.5" height="1.5" opacity="0.7"/>
        <rect x="52" y="62" width="1.5" height="1.5" opacity="0.85"/>
        <rect x="56" y="62" width="1.5" height="1.5" opacity="0.7"/>
        <!-- 左排 -->
        <rect x="36.5" y="40" width="1.5" height="1.5" opacity="0.85"/>
        <rect x="36.5" y="44" width="1.5" height="1.5" opacity="0.7"/>
        <rect x="36.5" y="48" width="1.5" height="1.5" opacity="0.85"/>
        <rect x="36.5" y="52" width="1.5" height="1.5" opacity="0.7"/>
        <rect x="36.5" y="56" width="1.5" height="1.5" opacity="0.85"/>
        <!-- 右排 -->
        <rect x="62" y="40" width="1.5" height="1.5" opacity="0.7"/>
        <rect x="62" y="44" width="1.5" height="1.5" opacity="0.85"/>
        <rect x="62" y="48" width="1.5" height="1.5" opacity="0.7"/>
        <rect x="62" y="52" width="1.5" height="1.5" opacity="0.85"/>
        <rect x="62" y="56" width="1.5" height="1.5" opacity="0.7"/>
      </g>

      <!-- die 內部走線 (trace) -->
      <g stroke="#7B3FFF" stroke-width="0.3" fill="none" opacity="0.6">
        <path d="M 40.75 38 L 40.75 41 L 43 41"/>
        <path d="M 56.75 38 L 56.75 41 L 54 41"/>
        <path d="M 40.75 62 L 40.75 59 L 43 59"/>
        <path d="M 56.75 62 L 56.75 59 L 54 59"/>
        <path d="M 38 40.75 L 41 40.75 L 41 43"/>
        <path d="M 62 40.75 L 59 40.75 L 59 43"/>
        <path d="M 38 56.75 L 41 56.75 L 41 54"/>
        <path d="M 62 56.75 L 59 56.75 L 59 54"/>
      </g>

      <!-- die 上的角落金屬接點 -->
      <g fill="#7B3FFF">
        <rect x="38" y="38" width="2" height="2" opacity="0.85"/>
        <rect x="60" y="38" width="2" height="2" opacity="0.85"/>
        <rect x="38" y="60" width="2" height="2" opacity="0.85"/>
        <rect x="60" y="60" width="2" height="2" opacity="0.85"/>
      </g>

      <!-- 中央 reticle 對焦十字線 -->
      <g stroke="#7DF9FF" stroke-width="0.4" opacity="0.85">
        <!-- 水平 -->
        <line x1="44" y1="50" x2="48" y2="50"/>
        <line x1="52" y1="50" x2="56" y2="50"/>
        <!-- 垂直 -->
        <line x1="50" y1="44" x2="50" y2="48"/>
        <line x1="50" y1="52" x2="50" y2="56"/>
      </g>

      <!-- 中央目標（核心發光點） -->
      <g filter="url(#probeGlow)">
        <circle cx="50" cy="50" r="2.5" fill="url(#ringGrad)"/>
        <circle cx="50" cy="50" r="1.4" fill="#FFFFFF"/>
        <circle cx="50" cy="50" r="0.5" fill="#7DF9FF"/>
      </g>

      <!-- 探針從上方進入 -->
      <g>
        <!-- 探針本體 -->
        <line x1="50" y1="22" x2="50" y2="42" stroke="#7DF9FF" stroke-width="0.6"/>
        <!-- 探針光束（漸隱） -->
        <rect x="49.7" y="22" width="0.6" height="20" fill="url(#probeBeam)"/>
        <!-- 探針底座（三角形） -->
        <path d="M 47 22 L 53 22 L 50 26 Z" fill="#7DF9FF" opacity="0.95"/>
        <!-- 探針接觸光點（接觸 die） -->
        <circle cx="50" cy="42" r="1.5" fill="url(#padGlow)"/>
      </g>

      <!-- 角落微數據（小字） -->
      <text x="22" y="26" font-family="'JetBrains Mono', monospace" font-size="2.2" fill="#5B7FFF" opacity="0.7" letter-spacing="0.3">X:0.4</text>
      <text x="69" y="26" font-family="'JetBrains Mono', monospace" font-size="2.2" fill="#5B7FFF" opacity="0.7" letter-spacing="0.3">Y:0.4</text>
      <text x="22" y="78" font-family="'JetBrains Mono', monospace" font-size="2.2" fill="#5B7FFF" opacity="0.7" letter-spacing="0.3">μm</text>
      <text x="69" y="78" font-family="'JetBrains Mono', monospace" font-size="2.2" fill="#7DF9FF" opacity="0.85" letter-spacing="0.3">OK</text>

      <!-- 環狀同心圈（探測範圍） -->
      <g fill="none" stroke="#7DF9FF" opacity="0.15">
        <circle cx="50" cy="50" r="6" stroke-width="0.3"/>
        <circle cx="50" cy="50" r="10" stroke-width="0.3"/>
      </g>
    </g>

    <!-- 鏡框內側極細高光 (玻璃感) -->
    <path d="M 26 38 A 28 28 0 0 1 38 26" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.4" stroke-linecap="round"/>

    <!-- ==================== 握把（多段精密儀器感） ==================== -->
    <g>
      <!-- 陰影底層 -->
      <line x1="74" y1="74" x2="93" y2="93" stroke="#000000" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
      <!-- 主握把 -->
      <line x1="74" y1="74" x2="93" y2="93" stroke="url(#handleMetal)" stroke-width="4.2" stroke-linecap="round"/>
      <!-- 握把上方反光 -->
      <line x1="74.5" y1="74.5" x2="84" y2="84" stroke="#FFFFFF" stroke-width="0.7" stroke-linecap="round" opacity="0.55"/>
      <!-- 分節環 (三道) -->
      <line x1="78" y1="84" x2="82" y2="80" stroke="#01030A" stroke-width="0.7" stroke-linecap="round" opacity="0.85"/>
      <line x1="82" y1="88" x2="86" y2="84" stroke="#01030A" stroke-width="0.7" stroke-linecap="round" opacity="0.85"/>
      <line x1="86" y1="92" x2="90" y2="88" stroke="#01030A" stroke-width="0.7" stroke-linecap="round" opacity="0.85"/>
      <!-- 端點（光點） -->
      <circle cx="93" cy="93" r="2.5" fill="url(#handleMetal)"/>
      <circle cx="93" cy="93" r="1" fill="#FFFFFF" opacity="0.85"/>
      <!-- 端點外光暈 -->
      <circle cx="93" cy="93" r="3.5" fill="none" stroke="#7DF9FF" stroke-width="0.3" opacity="0.5"/>
    </g>
  </g>

  <!-- ==================== 文字（深底版）==================== -->
  <g transform="translate(124, 0)">

    <!-- 上方刻度標尺 -->
    <g stroke="#5B7FFF" opacity="0.5">
      <line x1="0" y1="20" x2="80" y2="20" stroke-width="0.4"/>
      <line x1="0" y1="20" x2="0" y2="24" stroke-width="0.6"/>
      <line x1="20" y1="20" x2="20" y2="22" stroke-width="0.3"/>
      <line x1="40" y1="20" x2="40" y2="23" stroke-width="0.4"/>
      <line x1="60" y1="20" x2="60" y2="22" stroke-width="0.3"/>
      <line x1="80" y1="20" x2="80" y2="24" stroke-width="0.6"/>
    </g>
    <text x="0" y="17" font-family="'JetBrains Mono', monospace" font-size="4" fill="#5B7FFF" opacity="0.6" letter-spacing="0.5">0</text>
    <text x="76" y="17" font-family="'JetBrains Mono', monospace" font-size="4" fill="#5B7FFF" opacity="0.6" letter-spacing="0.5">100</text>

    <!-- 主標題 -->
    <text x="0" y="62" font-family="'Space Grotesk', 'Helvetica Neue', sans-serif" font-size="36" font-weight="700" letter-spacing="-1.5" fill="#FFFFFF">
      AI<tspan fill="url(#ringGrad)">Patent</tspan>Insight
    </text>

    <!-- 副標 (細線 + 文字) -->
    <g transform="translate(2, 88)">
      <line x1="0" y1="0" x2="6" y2="0" stroke="#7DF9FF" stroke-width="1"/>
      <text x="12" y="3" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500" letter-spacing="3.5" fill="#7DF9FF" opacity="0.9">
        INTELLIGENCE · DISCOVERY · EDGE
      </text>
    </g>

    <!-- 系統狀態列 -->
    <g transform="translate(2, 104)" font-family="'JetBrains Mono', monospace" font-size="6" letter-spacing="1.2">
      <circle cx="0" cy="-2" r="1" fill="#7DF9FF"/>
      <text x="6" y="0" fill="#8B92A8" opacity="0.7">[SYSTEM ONLINE]</text>
      <text x="86" y="0" fill="#8B92A8" opacity="0.5">·</text>
      <text x="92" y="0" fill="#8B92A8" opacity="0.7">PATENT INTEL ENGINE</text>
    </g>
  </g>
</svg>
