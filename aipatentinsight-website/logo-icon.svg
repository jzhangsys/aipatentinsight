<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04081C"/>
      <stop offset="100%" stop-color="#0A1235"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="40%" stop-color="#5B7FFF"/>
      <stop offset="100%" stop-color="#7B3FFF"/>
    </linearGradient>
    <radialGradient id="lensFill" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0A1235"/>
      <stop offset="60%" stop-color="#040818"/>
      <stop offset="100%" stop-color="#01030A"/>
    </radialGradient>
    <linearGradient id="handleMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="50%" stop-color="#5B7FFF"/>
      <stop offset="100%" stop-color="#7B3FFF"/>
    </linearGradient>
    <linearGradient id="probeBeam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7DF9FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7DF9FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="padGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DF9FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7DF9FF" stop-opacity="0"/>
    </radialGradient>

    <pattern id="diePattern" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 0 2 L 4 2 M 2 0 L 2 4" stroke="#5B7FFF" stroke-width="0.15" opacity="0.45"/>
    </pattern>

    <pattern id="bgGrid" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M 6 0 L 0 0 0 6" fill="none" stroke="#5B7FFF" stroke-width="0.2" opacity="0.3"/>
    </pattern>

    <clipPath id="iconLensClip">
      <circle cx="58" cy="58" r="32"/>
    </clipPath>

    <filter id="iMicro" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iProbe" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圓角背景 -->
  <rect x="0" y="0" width="120" height="120" rx="24" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="120" height="120" rx="24" fill="url(#bgGrid)" opacity="0.5"/>

  <!-- 角落 HUD -->
  <g stroke="#7DF9FF" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 8 16 L 8 8 L 16 8"/>
    <path d="M 104 8 L 112 8 L 112 16"/>
    <path d="M 8 104 L 8 112 L 16 112"/>
    <path d="M 104 112 L 112 112 L 112 104"/>
  </g>
  <text x="14" y="14" font-family="'JetBrains Mono', monospace" font-size="3.5" fill="#5B7FFF" opacity="0.7" letter-spacing="0.4">SCAN-01</text>
  <text x="98" y="116" font-family="'JetBrains Mono', monospace" font-size="3.5" fill="#5B7FFF" opacity="0.7" letter-spacing="0.4">CH:A1</text>

  <!-- 對位十字 -->
  <g stroke="#5B7FFF" stroke-width="0.5" opacity="0.55">
    <line x1="18" y1="18" x2="24" y2="18"/>
    <line x1="21" y1="15" x2="21" y2="21"/>
    <line x1="96" y1="102" x2="102" y2="102"/>
    <line x1="99" y1="99" x2="99" y2="105"/>
  </g>

  <!-- 三層精度環 -->
  <g fill="none">
    <circle cx="58" cy="58" r="38" stroke="#5B7FFF" stroke-width="0.4" stroke-dasharray="1.5 3" opacity="0.5"/>
    <circle cx="58" cy="58" r="34" stroke="url(#ringGrad)" stroke-width="2.5"/>
    <circle cx="58" cy="58" r="30" stroke="#5B7FFF" stroke-width="0.4" opacity="0.5"/>
  </g>

  <!-- 主刻度 -->
  <g stroke="#7DF9FF" opacity="0.85">
    <line x1="58" y1="18" x2="58" y2="23" stroke-width="0.9"/>
    <line x1="58" y1="93" x2="58" y2="98" stroke-width="0.9"/>
    <line x1="18" y1="58" x2="23" y2="58" stroke-width="0.9"/>
    <line x1="93" y1="58" x2="98" y2="58" stroke-width="0.9"/>
  </g>
  <!-- 細刻度 -->
  <g stroke="#5B7FFF" stroke-width="0.4" opacity="0.6">
    <line x1="58" y1="19.5" x2="58" y2="22" transform="rotate(30 58 58)"/>
    <line x1="58" y1="19.5" x2="58" y2="22" transform="rotate(60 58 58)"/>
    <line x1="58" y1="19.5" x2="58" y2="22" transform="rotate(120 58 58)"/>
    <line x1="58" y1="19.5" x2="58" y2="22" transform="rotate(150 58 58)"/>
    <line x1="58" y1="19.5" x2="58" y2="22" transform="rotate(210 58 58)"/>
    <line x1="58" y1="19.5" x2="58" y2="22" transform="rotate(240 58 58)"/>
    <line x1="58" y1="19.5" x2="58" y2="22" transform="rotate(300 58 58)"/>
    <line x1="58" y1="19.5" x2="58" y2="22" transform="rotate(330 58 58)"/>
  </g>

  <!-- 鏡片內部 -->
  <g clip-path="url(#iconLensClip)">
    <circle cx="58" cy="58" r="32" fill="url(#lensFill)"/>
    <rect x="26" y="26" width="64" height="64" fill="url(#diePattern)"/>

    <!-- 三層 die 邊框 -->
    <g fill="none" stroke="#5B7FFF">
      <rect x="44" y="44" width="28" height="28" stroke-width="0.6" opacity="0.75"/>
      <rect x="49" y="49" width="18" height="18" stroke-width="0.4" opacity="0.55"/>
      <rect x="53" y="53" width="10" height="10" stroke-width="0.4" opacity="0.65"/>
    </g>

    <!-- 焊墊 4 邊 -->
    <g fill="#7DF9FF" filter="url(#iMicro)">
      <!-- 上 -->
      <rect x="46" y="42" width="1.8" height="1.8" opacity="0.85"/>
      <rect x="51" y="42" width="1.8" height="1.8" opacity="0.7"/>
      <rect x="56" y="42" width="1.8" height="1.8" opacity="0.85"/>
      <rect x="61" y="42" width="1.8" height="1.8" opacity="0.7"/>
      <rect x="66" y="42" width="1.8" height="1.8" opacity="0.85"/>
      <!-- 下 -->
      <rect x="46" y="72.2" width="1.8" height="1.8" opacity="0.7"/>
      <rect x="51" y="72.2" width="1.8" height="1.8" opacity="0.85"/>
      <rect x="56" y="72.2" width="1.8" height="1.8" opacity="0.7"/>
      <rect x="61" y="72.2" width="1.8" height="1.8" opacity="0.85"/>
      <rect x="66" y="72.2" width="1.8" height="1.8" opacity="0.7"/>
      <!-- 左 -->
      <rect x="42" y="46" width="1.8" height="1.8" opacity="0.85"/>
      <rect x="42" y="51" width="1.8" height="1.8" opacity="0.7"/>
      <rect x="42" y="56" width="1.8" height="1.8" opacity="0.85"/>
      <rect x="42" y="61" width="1.8" height="1.8" opacity="0.7"/>
      <rect x="42" y="66" width="1.8" height="1.8" opacity="0.85"/>
      <!-- 右 -->
      <rect x="72.2" y="46" width="1.8" height="1.8" opacity="0.7"/>
      <rect x="72.2" y="51" width="1.8" height="1.8" opacity="0.85"/>
      <rect x="72.2" y="56" width="1.8" height="1.8" opacity="0.7"/>
      <rect x="72.2" y="61" width="1.8" height="1.8" opacity="0.85"/>
      <rect x="72.2" y="66" width="1.8" height="1.8" opacity="0.7"/>
    </g>

    <!-- die trace -->
    <g stroke="#7B3FFF" stroke-width="0.4" fill="none" opacity="0.65">
      <path d="M 46.9 44 L 46.9 47.5 L 50 47.5"/>
      <path d="M 66.9 44 L 66.9 47.5 L 64 47.5"/>
      <path d="M 46.9 72 L 46.9 68.5 L 50 68.5"/>
      <path d="M 66.9 72 L 66.9 68.5 L 64 68.5"/>
      <path d="M 44 46.9 L 47.5 46.9 L 47.5 50"/>
      <path d="M 72 46.9 L 68.5 46.9 L 68.5 50"/>
      <path d="M 44 66.9 L 47.5 66.9 L 47.5 64"/>
      <path d="M 72 66.9 L 68.5 66.9 L 68.5 64"/>
    </g>

    <!-- 角落金屬接點 -->
    <g fill="#7B3FFF">
      <rect x="44" y="44" width="2.5" height="2.5" opacity="0.85"/>
      <rect x="69.5" y="44" width="2.5" height="2.5" opacity="0.85"/>
      <rect x="44" y="69.5" width="2.5" height="2.5" opacity="0.85"/>
      <rect x="69.5" y="69.5" width="2.5" height="2.5" opacity="0.85"/>
    </g>

    <!-- reticle 對焦十字 -->
    <g stroke="#7DF9FF" stroke-width="0.5" opacity="0.9">
      <line x1="50" y1="58" x2="55" y2="58"/>
      <line x1="61" y1="58" x2="66" y2="58"/>
      <line x1="58" y1="50" x2="58" y2="55"/>
      <line x1="58" y1="61" x2="58" y2="66"/>
    </g>

    <!-- 中心目標 -->
    <g filter="url(#iProbe)">
      <circle cx="58" cy="58" r="2.8" fill="url(#ringGrad)"/>
      <circle cx="58" cy="58" r="1.6" fill="#FFFFFF"/>
      <circle cx="58" cy="58" r="0.6" fill="#7DF9FF"/>
    </g>

    <!-- 探針從上進入 -->
    <g>
      <line x1="58" y1="28" x2="58" y2="50" stroke="#7DF9FF" stroke-width="0.7"/>
      <rect x="57.65" y="28" width="0.7" height="22" fill="url(#probeBeam)"/>
      <path d="M 54.5 28 L 61.5 28 L 58 33 Z" fill="#7DF9FF"/>
      <circle cx="58" cy="50" r="2" fill="url(#padGlow)"/>
    </g>

    <!-- 角落微數據 -->
    <text x="28" y="32" font-family="'JetBrains Mono', monospace" font-size="2.6" fill="#5B7FFF" opacity="0.75" letter-spacing="0.3">X:0.4</text>
    <text x="78" y="32" font-family="'JetBrains Mono', monospace" font-size="2.6" fill="#5B7FFF" opacity="0.75" letter-spacing="0.3">Y:0.4</text>
    <text x="28" y="86" font-family="'JetBrains Mono', monospace" font-size="2.6" fill="#5B7FFF" opacity="0.75" letter-spacing="0.3">μm</text>
    <text x="78" y="86" font-family="'JetBrains Mono', monospace" font-size="2.6" fill="#7DF9FF" opacity="0.9" letter-spacing="0.3">OK</text>

    <!-- 內部探測同心圈 -->
    <g fill="none" stroke="#7DF9FF" opacity="0.18">
      <circle cx="58" cy="58" r="7" stroke-width="0.3"/>
      <circle cx="58" cy="58" r="12" stroke-width="0.3"/>
    </g>
  </g>

  <!-- 鏡框內側高光 -->
  <path d="M 32 46 A 30 30 0 0 1 46 32" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>

  <!-- 握把 -->
  <g>
    <line x1="84" y1="84" x2="105" y2="105" stroke="#000000" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
    <line x1="84" y1="84" x2="105" y2="105" stroke="url(#handleMetal)" stroke-width="5" stroke-linecap="round"/>
    <line x1="85" y1="85" x2="94" y2="94" stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
    <line x1="89" y1="95" x2="93" y2="91" stroke="#01030A" stroke-width="0.8" stroke-linecap="round" opacity="0.85"/>
    <line x1="94" y1="100" x2="98" y2="96" stroke="#01030A" stroke-width="0.8" stroke-linecap="round" opacity="0.85"/>
    <line x1="99" y1="105" x2="103" y2="101" stroke="#01030A" stroke-width="0.8" stroke-linecap="round" opacity="0.85"/>
    <circle cx="105" cy="105" r="3" fill="url(#handleMetal)"/>
    <circle cx="105" cy="105" r="1.2" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="105" cy="105" r="4" fill="none" stroke="#7DF9FF" stroke-width="0.3" opacity="0.5"/>
  </g>
</svg>
