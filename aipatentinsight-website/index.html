<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIPatentInsight — 產業演化趨勢</title>
<link rel="icon" type="image/svg+xml" href="logo-icon.svg">
<link rel="stylesheet" href="styles.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap');

  :root {
    --font-futura: 'Futura', 'Futura PT', 'Century Gothic', 'Jost', 'Avenir Next', sans-serif;
  }

  body { overflow-x: hidden; margin: 0; }

  .hero {
    position: relative;
    height: 100vh;
    min-height: 760px;
    overflow: hidden;
    background: #02040C;
  }

  #ocean-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    display: block;
  }

  .vignette {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(2,4,12,0.7) 0%, transparent 18%, transparent 80%, rgba(2,4,12,0.7) 100%),
      linear-gradient(90deg, rgba(2,4,12,0.5) 0%, transparent 12%, transparent 88%, rgba(2,4,12,0.5) 100%);
  }

  /* ========================================
     頂部導覽列
     ======================================== */
  .nav {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    backdrop-filter: blur(8px);
    background: linear-gradient(180deg, rgba(2,4,12,0.6) 0%, transparent 100%);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    pointer-events: auto;
  }
  .nav-logo img {
    height: 38px;
    width: auto;
    display: block;
  }

  .nav-menu {
    display: flex;
    align-items: center;
    gap: 36px;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav-menu li a {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.7);
    text-decoration: none;
    transition: color 0.2s ease;
    pointer-events: auto;
  }
  .nav-menu li a:hover {
    color: rgba(125, 249, 255, 1);
  }
  .nav-menu li a.active {
    color: rgba(125, 249, 255, 1);
    position: relative;
  }
  .nav-menu li a.active::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -8px;
    height: 1px;
    background: rgba(125, 249, 255, 0.7);
  }

  .nav-cta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(2, 4, 12, 1);
    background: rgba(125, 249, 255, 0.9);
    border: none;
    padding: 9px 18px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s ease;
    pointer-events: auto;
  }
  .nav-cta:hover {
    background: rgba(125, 249, 255, 1);
  }

  /* ========================================
     中央敘事
     ======================================== */
  .hero-narrative {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 90%;
    max-width: 760px;
    pointer-events: none;
  }

  .narrative-title {
    font-family: var(--font-futura);
    font-size: clamp(2rem, 3.5vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.32em;
    line-height: 1;
    color: rgba(255, 255, 255, 0.92);
    margin: 0;
  }
  .narrative-title .accent {
    color: rgba(125, 249, 255, 0.9);
    font-weight: 400;
  }

  .narrative-trend {
    margin-top: 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 18px;
    transition: opacity 0.5s ease;
  }
  .narrative-trend.fading { opacity: 0; }
  .trend-marker {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
  }
  .trend-text {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.92);
  }

  /* ========================================
     尺規時間軸
     ======================================== */
  .ruler-section {
    margin-top: 56px;
    width: 100%;
    max-width: 640px;
    pointer-events: auto;
  }

  .ruler-date {
    font-family: var(--font-futura);
    margin-bottom: 18px;
    font-size: 36px;
    font-weight: 300;
    line-height: 1;
    color: rgba(255, 255, 255, 0.95);
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    text-align: center;
  }

  .ruler-track {
    position: relative;
    width: 100%;
    height: 36px;
    cursor: pointer;
  }
  .ruler-baseline {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(125, 249, 255, 0.15);
  }
  .ruler-fill {
    position: absolute;
    top: 50%;
    left: 0;
    height: 1px;
    width: 0;
    background: linear-gradient(90deg, rgba(125, 249, 255, 0.2), rgba(125, 249, 255, 0.6));
    transition: width 0.3s ease;
  }
  .ruler-ticks {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
  }
  .ruler-tick {
    position: absolute;
    top: 50%;
    width: 1px;
    background: rgba(125, 249, 255, 0.25);
    transform: translateY(-50%);
  }
  .ruler-tick.minor { height: 6px; }
  .ruler-tick.major { height: 14px; background: rgba(125, 249, 255, 0.6); }
  .ruler-tick.year { height: 20px; background: rgba(125, 249, 255, 0.85); }

  .ruler-cursor {
    position: absolute;
    top: 50%;
    width: 2px;
    height: 28px;
    background: rgba(125, 249, 255, 1);
    box-shadow: 0 0 12px rgba(125, 249, 255, 0.9);
    transform: translate(-50%, -50%);
    transition: left 0.05s linear;
    pointer-events: none;
  }
  .ruler-cursor::after {
    content: '';
    position: absolute;
    top: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(125, 249, 255, 1);
    box-shadow: 0 0 10px rgba(125, 249, 255, 0.9);
  }

  .ruler-years {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.2em;
    font-variant-numeric: tabular-nums;
  }

  /* Loading & Error */
  .loading-overlay {
    position: absolute; inset: 0; z-index: 100; background: #02040C;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; transition: opacity 0.8s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-text {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.4em;
    color: rgba(125, 249, 255, 0.6); text-transform: uppercase;
  }
  .loading-bar {
    width: 160px; height: 1px; background: rgba(125, 249, 255, 0.1);
    overflow: hidden; position: relative;
  }
  .loading-bar::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(125, 249, 255, 0.7), transparent);
    animation: loading 1.4s ease-in-out infinite;
  }
  @keyframes loading {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .error-overlay {
    position: absolute; inset: 0; z-index: 200; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(2, 4, 12, 0.95); color: #FF7777;
    font-family: var(--font-mono); font-size: 13px; text-align: center;
    padding: 40px; line-height: 1.6;
  }
  .error-overlay.show { display: flex; }
  .error-overlay strong { color: rgba(125, 249, 255, 0.8); display: block; margin-bottom: 12px; letter-spacing: 0.2em; }

  /* 響應式:手機隱藏 menu,只保留 logo + CTA */
  @media (max-width: 900px) {
    .nav { padding: 18px 24px; }
    .nav-menu { display: none; }
    .nav-logo img { height: 32px; }
    .narrative-title { letter-spacing: 0.2em; }
    .ruler-date { font-size: 28px; }
    .ruler-section { max-width: 320px; margin-top: 40px; }
  }
</style>
</head>
<body>

<section class="hero">
  <canvas id="ocean-canvas"></canvas>
  <div class="vignette"></div>

  <div class="loading-overlay" id="loading">
    <div class="loading-text">Initializing</div>
    <div class="loading-bar"></div>
  </div>

  <div class="error-overlay" id="error-overlay">
    <strong>RENDER ERROR</strong>
    <div id="error-msg"></div>
  </div>

  <!-- 頂部導覽列 -->
  <nav class="nav">
    <a href="#" class="nav-logo">
      <img src="logo-primary-dark.svg" alt="AIPatentInsight">
    </a>
    <ul class="nav-menu">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="#">Insights</a></li>
      <li><a href="#">Platform</a></li>
      <li><a href="#">Pricing</a></li>
      <li><a href="#">About</a></li>
    </ul>
    <a href="#" class="nav-cta">Launch →</a>
  </nav>

  <!-- 中央內容 -->
  <div class="hero-narrative">
    <h1 class="narrative-title">產業<span class="accent">演化</span>趨勢</h1>

    <div class="narrative-trend" id="trend-display">
      <span class="trend-marker" id="trend-marker" style="background: #9DEBFF; color: #9DEBFF;"></span>
      <span class="trend-text" id="trend-text">矽光子</span>
    </div>

    <div class="ruler-section">
      <div class="ruler-date" id="date-main">2023.01</div>

      <div class="ruler-track" id="ruler-track">
        <div class="ruler-baseline"></div>
        <div class="ruler-fill" id="ruler-fill"></div>
        <div class="ruler-ticks" id="ruler-ticks"></div>
        <div class="ruler-cursor" id="ruler-cursor" style="left: 0%"></div>
      </div>

      <div class="ruler-years">
        <span>2023</span>
        <span>2024</span>
        <span>2025</span>
        <span>2026</span>
      </div>
    </div>
  </div>
</section>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>

<script type="module">
  function showError(msg) {
    const o = document.getElementById('error-overlay');
    const m = document.getElementById('error-msg');
    if (o && m) { m.textContent = msg; o.classList.add('show'); }
    document.getElementById('loading')?.classList.add('hidden');
    console.error('[Hero]', msg);
  }
  window.addEventListener('error', (e) => showError(e.message || 'Unknown error'));

  async function loadThree() {
    const cdns = [
      'https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js',
      'https://unpkg.com/three@0.170.0/build/three.module.js',
      'https://esm.sh/three@0.170.0',
      'https://cdn.skypack.dev/three@0.170.0',
    ];
    for (const url of cdns) {
      try {
        const mod = await import(url);
        console.log('[Hero] Loaded from:', url, 'r' + mod.REVISION);
        return mod;
      } catch (e) {
        console.warn('[Hero] CDN failed:', url, e.message);
      }
    }
    throw new Error('All CDN endpoints failed.');
  }

  let THREE;
  try { THREE = await loadThree(); }
  catch (err) { showError('Failed to load Three.js: ' + err.message); throw err; }

  // ============== 8 條洋流 ==============
  const CURRENTS = [
    { name: '矽光子',     color: 0x9DEBFF, baseY:  2.3, phase: 0.0, freq: 0.32, amp: 0.32 },
    { name: 'AI 晶片',    color: 0x7DDFFF, baseY:  1.6, phase: 0.7, freq: 0.28, amp: 0.30 },
    { name: 'AI Server',  color: 0x6EC4F5, baseY:  0.9, phase: 1.4, freq: 0.36, amp: 0.28 },
    { name: '先進封裝',   color: 0x5FA8E8, baseY:  0.2, phase: 2.1, freq: 0.30, amp: 0.34 },
    { name: '散熱模組',   color: 0x6E8FE6, baseY: -0.5, phase: 2.8, freq: 0.34, amp: 0.30 },
    { name: '光學元件',   color: 0x8E7FE0, baseY: -1.2, phase: 3.5, freq: 0.30, amp: 0.32 },
    { name: '半導體製程', color: 0x7FA0F0, baseY: -1.9, phase: 4.2, freq: 0.36, amp: 0.28 },
    { name: '特級化學品', color: 0xA08FE5, baseY: -2.6, phase: 4.9, freq: 0.32, amp: 0.30 },
  ];

  const MONTH_TO_DOMAIN = [];
  for (let m = 0; m < 36; m++) {
    MONTH_TO_DOMAIN.push(Math.floor(m / 3) % 8);
  }

  const NOISE_COUNT = 1800;
  const PARTICLES_PER_CURRENT = 380;
  const TOTAL_CURRENT = CURRENTS.length * PARTICLES_PER_CURRENT;

  const canvas = document.getElementById('ocean-canvas');
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x02040C, 0.04);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 8);

  const renderer = new THREE.WebGLRenderer({
    canvas, antialias: true, alpha: true, powerPreference: 'high-performance'
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  // NOISE
  const noisePos = new Float32Array(NOISE_COUNT * 3);
  const noiseVel = new Float32Array(NOISE_COUNT * 3);
  const noiseSize = new Float32Array(NOISE_COUNT);
  const noiseSeed = new Float32Array(NOISE_COUNT);
  for (let i = 0; i < NOISE_COUNT; i++) {
    noisePos[i*3]     = (Math.random() - 0.5) * 16;
    noisePos[i*3 + 1] = (Math.random() - 0.5) * 8;
    noisePos[i*3 + 2] = (Math.random() - 0.5) * 4;
    noiseVel[i*3]     = (Math.random() - 0.5) * 0.04;
    noiseVel[i*3 + 1] = (Math.random() - 0.5) * 0.025;
    noiseSize[i] = Math.random() < 0.9 ? 0.5 + Math.random() * 0.7 : 1.3 + Math.random() * 0.8;
    noiseSeed[i] = Math.random() * 10;
  }
  const noiseGeom = new THREE.BufferGeometry();
  noiseGeom.setAttribute('position', new THREE.BufferAttribute(noisePos, 3));
  noiseGeom.setAttribute('size', new THREE.BufferAttribute(noiseSize, 1));

  const noiseMat = new THREE.ShaderMaterial({
    uniforms: { pixelRatio: { value: renderer.getPixelRatio() } },
    vertexShader: `
      attribute float size;
      varying float vDepth;
      uniform float pixelRatio;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vDepth = -mv.z;
        gl_PointSize = size * pixelRatio * (220.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying float vDepth;
      void main() {
        vec2 c = gl_PointCoord - vec2(0.5);
        float d = length(c);
        if (d > 0.5) discard;
        float alpha = smoothstep(0.5, 0.1, d) * 0.3;
        float fade = smoothstep(15.0, 4.0, vDepth);
        gl_FragColor = vec4(0.42, 0.55, 0.72, alpha * fade);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.NormalBlending
  });
  scene.add(new THREE.Points(noiseGeom, noiseMat));

  // CURRENTS
  const currPos = new Float32Array(TOTAL_CURRENT * 3);
  const currVel = new Float32Array(TOTAL_CURRENT * 3);
  const currCol = new Float32Array(TOTAL_CURRENT * 3);
  const currSize = new Float32Array(TOTAL_CURRENT);
  const currLife = new Float32Array(TOTAL_CURRENT);
  const currAge = new Float32Array(TOTAL_CURRENT);
  const currTotal = new Float32Array(TOTAL_CURRENT);
  const currIdx = new Int32Array(TOTAL_CURRENT);

  function spawnCurrent(idx) {
    const c = CURRENTS[currIdx[idx]];
    currPos[idx*3]     = -10 - Math.random() * 2;
    currPos[idx*3 + 1] = c.baseY + (Math.random() - 0.5) * 0.55;
    currPos[idx*3 + 2] = (Math.random() - 0.5) * 0.8;
    currVel[idx*3]     = 1.4 + Math.random() * 0.5;
    currVel[idx*3 + 1] = (Math.random() - 0.5) * 0.04;
    currVel[idx*3 + 2] = 0;
    const r = Math.random();
    currSize[idx] = r < 0.7 ? 0.8 + Math.random() * 1.0 : 2.0 + Math.random() * 1.5;
    currLife[idx] = 0;
    currAge[idx] = 0;
    currTotal[idx] = 7 + Math.random() * 4;
  }

  let p = 0;
  for (let cIdx = 0; cIdx < CURRENTS.length; cIdx++) {
    for (let i = 0; i < PARTICLES_PER_CURRENT; i++) {
      currIdx[p] = cIdx;
      spawnCurrent(p);
      currAge[p] = Math.random() * currTotal[p];
      currPos[p*3] = -10 + currAge[p] * 1.6;
      const col = new THREE.Color(CURRENTS[cIdx].color);
      currCol[p*3]     = col.r;
      currCol[p*3 + 1] = col.g;
      currCol[p*3 + 2] = col.b;
      p++;
    }
  }

  const currGeom = new THREE.BufferGeometry();
  currGeom.setAttribute('position', new THREE.BufferAttribute(currPos, 3));
  currGeom.setAttribute('color', new THREE.BufferAttribute(currCol, 3));
  currGeom.setAttribute('size', new THREE.BufferAttribute(currSize, 1));
  currGeom.setAttribute('alife', new THREE.BufferAttribute(currLife, 1));

  const currMat = new THREE.ShaderMaterial({
    uniforms: { pixelRatio: { value: renderer.getPixelRatio() } },
    vertexShader: `
      attribute float size;
      attribute float alife;
      varying vec3 vColor;
      varying float vDepth;
      varying float vLife;
      uniform float pixelRatio;
      void main() {
        vColor = color;
        vLife = alife;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vDepth = -mv.z;
        gl_PointSize = size * pixelRatio * (260.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vDepth;
      varying float vLife;
      void main() {
        vec2 c = gl_PointCoord - vec2(0.5);
        float d = length(c);
        if (d > 0.5) discard;
        float alpha = smoothstep(0.5, 0.1, d) * 0.85;
        float fade = smoothstep(20.0, 4.0, vDepth);
        alpha *= fade * vLife;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.NormalBlending,
    vertexColors: true
  });
  scene.add(new THREE.Points(currGeom, currMat));

  const tailGeom = new THREE.BufferGeometry();
  const tailPos = new Float32Array(TOTAL_CURRENT * 6);
  const tailCol = new Float32Array(TOTAL_CURRENT * 6);
  tailGeom.setAttribute('position', new THREE.BufferAttribute(tailPos, 3));
  tailGeom.setAttribute('color', new THREE.BufferAttribute(tailCol, 3));
  const tailMat = new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.4,
    blending: THREE.NormalBlending, depthWrite: false
  });
  scene.add(new THREE.LineSegments(tailGeom, tailMat));

  // 尺規
  const ticksContainer = document.getElementById('ruler-ticks');
  for (let m = 0; m <= 36; m++) {
    const tick = document.createElement('div');
    tick.className = 'ruler-tick';
    if (m % 12 === 0) tick.classList.add('year');
    else if (m % 3 === 0) tick.classList.add('major');
    else tick.classList.add('minor');
    tick.style.left = (m / 36 * 100) + '%';
    ticksContainer.appendChild(tick);
  }

  let monthProgress = 0;
  let activeDomainIdx = 0;
  let activeIntensity = 1;
  let pendingDomainIdx = 0;

  const dateMainEl = document.getElementById('date-main');
  const rulerFillEl = document.getElementById('ruler-fill');
  const rulerCursorEl = document.getElementById('ruler-cursor');
  const trendDisplayEl = document.getElementById('trend-display');
  const trendMarkerEl = document.getElementById('trend-marker');
  const trendTextEl = document.getElementById('trend-text');
  const rulerTrack = document.getElementById('ruler-track');

  function formatDate(monthIdx) {
    const year = 2023 + Math.floor(monthIdx / 12);
    const month = (monthIdx % 12) + 1;
    return `${year}.${String(month).padStart(2, '0')}`;
  }

  let lastDisplayedMonth = -1;
  let lastDomainShown = -1;

  function updateUI() {
    const monthIdx = Math.min(35, Math.floor(monthProgress));
    const progressPct = (monthProgress / 36) * 100;
    rulerFillEl.style.width = progressPct + '%';
    rulerCursorEl.style.left = progressPct + '%';

    if (monthIdx !== lastDisplayedMonth) {
      lastDisplayedMonth = monthIdx;
      dateMainEl.textContent = formatDate(monthIdx);
    }

    const domainIdx = MONTH_TO_DOMAIN[monthIdx];
    if (domainIdx !== lastDomainShown) {
      lastDomainShown = domainIdx;
      const c = CURRENTS[domainIdx];
      const hex = '#' + c.color.toString(16).padStart(6, '0');

      trendDisplayEl.classList.add('fading');
      setTimeout(() => {
        trendTextEl.textContent = c.name;
        trendMarkerEl.style.background = hex;
        trendMarkerEl.style.color = hex;
        trendDisplayEl.classList.remove('fading');
      }, 350);

      pendingDomainIdx = domainIdx;
      activeIntensity = 0;
    }
  }

  rulerTrack.addEventListener('click', (e) => {
    const rect = rulerTrack.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    monthProgress = ratio * 36;
    updateUI();
  });

  const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
  window.addEventListener('mousemove', (e) => {
    mouse.tx = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.ty = -(e.clientY / window.innerHeight) * 2 + 1;
  });
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 800);

  updateUI();

  const clock = new THREE.Clock();
  let lastTime = 0;
  const SECONDS_PER_MONTH = 60 / 36;
  const currentColors = CURRENTS.map(c => new THREE.Color(c.color));

  function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();
    const dt = Math.min(0.05, time - lastTime);
    lastTime = time;

    monthProgress += dt / SECONDS_PER_MONTH;
    if (monthProgress >= 36) monthProgress = 0;
    updateUI();

    if (pendingDomainIdx !== activeDomainIdx) {
      activeIntensity += dt * 1.5;
      if (activeIntensity >= 1) {
        activeDomainIdx = pendingDomainIdx;
        activeIntensity = 1;
      }
    }

    // NOISE
    for (let i = 0; i < NOISE_COUNT; i++) {
      const i3 = i*3;
      const seed = noiseSeed[i];
      noiseVel[i3]     += (Math.sin(time * 0.4 + seed) * 0.025 - noiseVel[i3]) * 0.5 * dt;
      noiseVel[i3 + 1] += (Math.cos(time * 0.3 + seed * 1.3) * 0.018 - noiseVel[i3 + 1]) * 0.5 * dt;
      noisePos[i3]     += noiseVel[i3] * dt;
      noisePos[i3 + 1] += noiseVel[i3 + 1] * dt;
      if (noisePos[i3] > 9)  noisePos[i3] = -9;
      if (noisePos[i3] < -9) noisePos[i3] = 9;
      if (noisePos[i3 + 1] > 4.5)  noisePos[i3 + 1] = -4.5;
      if (noisePos[i3 + 1] < -4.5) noisePos[i3 + 1] = 4.5;
    }
    noiseGeom.attributes.position.needsUpdate = true;

    // CURRENTS
    for (let i = 0; i < TOTAL_CURRENT; i++) {
      const i3 = i*3;
      const cInfo = CURRENTS[currIdx[i]];
      let px = currPos[i3];
      let py = currPos[i3 + 1];
      let pz = currPos[i3 + 2];

      const target_y = cInfo.baseY + Math.sin(px * cInfo.freq + time * 0.5 + cInfo.phase) * cInfo.amp;
      const pull_y = (target_y - py) * 1.8;

      currVel[i3]     += (1.5 - currVel[i3]) * dt * 1.0;
      currVel[i3 + 1] += (pull_y - currVel[i3 + 1]) * dt * 2.5;
      currVel[i3 + 2] += ((Math.random() - 0.5) * 0.04 - currVel[i3 + 2]) * dt;

      const turb_x = Math.cos(py * 0.8 + time * 0.7 + cInfo.phase) * 0.08;
      currVel[i3] += turb_x * dt;

      const newX = px + currVel[i3] * dt;
      const newY = py + currVel[i3 + 1] * dt;
      const newZ = pz + currVel[i3 + 2] * dt;

      const tIdx = i*6;
      tailPos[tIdx]     = px;
      tailPos[tIdx + 1] = py;
      tailPos[tIdx + 2] = pz;
      tailPos[tIdx + 3] = newX;
      tailPos[tIdx + 4] = newY;
      tailPos[tIdx + 5] = newZ;

      currPos[i3]     = newX;
      currPos[i3 + 1] = newY;
      currPos[i3 + 2] = newZ;

      currAge[i] += dt;
      const lr = currAge[i] / currTotal[i];
      let life;
      if (lr < 0.08) life = lr / 0.08;
      else if (lr > 0.85) life = (1 - lr) / 0.15;
      else life = 1;
      life = Math.max(0, Math.min(1, life));

      const isActive = currIdx[i] === activeDomainIdx;
      const isPending = currIdx[i] === pendingDomainIdx;
      let strength;
      if (isActive && !isPending) strength = 1 - activeIntensity * 0.7;
      else if (isPending) strength = 0.3 + activeIntensity * 0.7;
      else strength = 0.3;

      currLife[i] = life * strength;

      const col = currentColors[currIdx[i]];
      currCol[i3]     = col.r;
      currCol[i3 + 1] = col.g;
      currCol[i3 + 2] = col.b;

      const tailA = life * strength * 0.6;
      tailCol[tIdx]     = col.r * 0.05;
      tailCol[tIdx + 1] = col.g * 0.05;
      tailCol[tIdx + 2] = col.b * 0.05;
      tailCol[tIdx + 3] = col.r * tailA;
      tailCol[tIdx + 4] = col.g * tailA;
      tailCol[tIdx + 5] = col.b * tailA;

      if (newX > 10 || currAge[i] > currTotal[i]) {
        spawnCurrent(i);
      }
    }
    currGeom.attributes.position.needsUpdate = true;
    currGeom.attributes.color.needsUpdate = true;
    currGeom.attributes.alife.needsUpdate = true;
    tailGeom.attributes.position.needsUpdate = true;
    tailGeom.attributes.color.needsUpdate = true;

    mouse.x += (mouse.tx - mouse.x) * 0.04;
    mouse.y += (mouse.ty - mouse.y) * 0.04;
    camera.position.x = mouse.x * 0.3;
    camera.position.y = mouse.y * 0.2;
    camera.position.z = 7.5;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  }

  animate();
</script>

</body>
</html>
