<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7FF"/>
      <stop offset="50%" stop-color="#5B7FFF"/>
      <stop offset="100%" stop-color="#7B3FFF"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1030"/>
      <stop offset="100%" stop-color="#1A1450"/>
    </linearGradient>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1030"/>
      <stop offset="100%" stop-color="#1A1450"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圓角方塊 -->
  <rect x="0" y="0" width="96" height="96" rx="20" fill="url(#bgGradient)"/>

  <!-- 文件層次 -->
  <g opacity="0.25" stroke="#6EE7FF" stroke-width="1" fill="none">
    <rect x="28" y="22" width="34" height="44" rx="2" transform="rotate(-8 45 44)"/>
    <rect x="32" y="26" width="34" height="44" rx="2" transform="rotate(4 49 48)"/>
  </g>

  <!-- 放大鏡 -->
  <circle cx="44" cy="44" r="28" fill="url(#coreGradient)" stroke="url(#lensGradient)" stroke-width="3.5"/>

  <!-- 電路節點網絡 -->
  <g filter="url(#softGlow)">
    <line x1="32" y1="36" x2="44" y2="44" stroke="#6EE7FF" stroke-width="1.4" opacity="0.7"/>
    <line x1="44" y1="44" x2="56" y2="34" stroke="#6EE7FF" stroke-width="1.4" opacity="0.7"/>
    <line x1="44" y1="44" x2="54" y2="56" stroke="#6EE7FF" stroke-width="1.4" opacity="0.7"/>
    <line x1="44" y1="44" x2="34" y2="54" stroke="#6EE7FF" stroke-width="1.4" opacity="0.7"/>
    <line x1="32" y1="36" x2="34" y2="54" stroke="#5B7FFF" stroke-width="1" opacity="0.5"/>
    <line x1="56" y1="34" x2="54" y2="56" stroke="#5B7FFF" stroke-width="1" opacity="0.5"/>

    <circle cx="32" cy="36" r="2.5" fill="#6EE7FF"/>
    <circle cx="56" cy="34" r="2.5" fill="#7B3FFF"/>
    <circle cx="54" cy="56" r="2.5" fill="#6EE7FF"/>
    <circle cx="34" cy="54" r="2.5" fill="#5B7FFF"/>

    <circle cx="44" cy="44" r="5" fill="url(#lensGradient)"/>
    <circle cx="44" cy="44" r="2.5" fill="#FFFFFF"/>
  </g>

  <!-- 握把 -->
  <line x1="65" y1="65" x2="82" y2="82" stroke="url(#lensGradient)" stroke-width="6" stroke-linecap="round"/>
</svg>
