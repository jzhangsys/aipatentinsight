<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 96" width="480" height="96">
  <defs>
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7FF"/>
      <stop offset="50%" stop-color="#5B7FFF"/>
      <stop offset="100%" stop-color="#7B3FFF"/>
    </linearGradient>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1030"/>
      <stop offset="100%" stop-color="#1A1450"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6EE7FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6EE7FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(8, 8)">
    <circle cx="40" cy="40" r="38" fill="url(#glow)"/>

    <g opacity="0.35" stroke="#6EE7FF" stroke-width="1" fill="none">
      <rect x="22" y="18" width="28" height="36" rx="2" transform="rotate(-8 36 36)"/>
      <rect x="26" y="22" width="28" height="36" rx="2" transform="rotate(4 40 40)"/>
    </g>

    <circle cx="36" cy="36" r="24" fill="url(#coreGradient)" stroke="url(#lensGradient)" stroke-width="3"/>

    <g filter="url(#softGlow)">
      <line x1="26" y1="30" x2="36" y2="36" stroke="#6EE7FF" stroke-width="1.2" opacity="0.7"/>
      <line x1="36" y1="36" x2="46" y2="28" stroke="#6EE7FF" stroke-width="1.2" opacity="0.7"/>
      <line x1="36" y1="36" x2="44" y2="46" stroke="#6EE7FF" stroke-width="1.2" opacity="0.7"/>
      <line x1="36" y1="36" x2="28" y2="44" stroke="#6EE7FF" stroke-width="1.2" opacity="0.7"/>
      <line x1="26" y1="30" x2="28" y2="44" stroke="#5B7FFF" stroke-width="1" opacity="0.5"/>
      <line x1="46" y1="28" x2="44" y2="46" stroke="#5B7FFF" stroke-width="1" opacity="0.5"/>

      <circle cx="26" cy="30" r="2" fill="#6EE7FF"/>
      <circle cx="46" cy="28" r="2" fill="#7B3FFF"/>
      <circle cx="44" cy="46" r="2" fill="#6EE7FF"/>
      <circle cx="28" cy="44" r="2" fill="#5B7FFF"/>

      <circle cx="36" cy="36" r="4" fill="url(#lensGradient)"/>
      <circle cx="36" cy="36" r="2" fill="#FFFFFF"/>
    </g>

    <line x1="54" y1="54" x2="72" y2="72" stroke="url(#lensGradient)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- 文字（深底用：白字 + 漸層強調） -->
  <g transform="translate(108, 0)">
    <text x="0" y="48" font-family="'Space Grotesk', 'Helvetica Neue', sans-serif" font-size="32" font-weight="700" letter-spacing="-1" fill="#FFFFFF">
      AI<tspan fill="url(#lensGradient)">Patent</tspan>Insight
    </text>
    <text x="2" y="72" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="500" letter-spacing="3" fill="#6EE7FF" opacity="0.85">
      INTELLIGENCE · DISCOVERY · EDGE
    </text>
  </g>
</svg>
